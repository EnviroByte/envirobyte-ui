# After @envirobyte/ui is tagged (v*) and published to npm, this notifies app repos to refresh
# package-lock.json via repository_dispatch → each repo's .github/workflows/update-ui.yml.
#
# Required secret on THIS repo: UI_CONSUMER_DISPATCH_TOKEN — PAT with `repo` on every consumer
# listed below (forks / org split: edit the list or add the bot account to all repos).

name: Notify consumers — @envirobyte/ui tagged

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version for downstream commit messages (e.g. 0.3.0 or v0.3.0)"
        required: true
        type: string

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW="${{ inputs.version }}"
          else
            RAW="${{ github.ref_name }}"
          fi
          echo "raw=${RAW}" >> "$GITHUB_OUTPUT"
          echo "clean=${RAW#v}" >> "$GITHUB_OUTPUT"

      - name: Repository dispatch
        env:
          TOKEN: ${{ secrets.UI_CONSUMER_DISPATCH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          body=$(jq -nc --arg v "${{ steps.meta.outputs.clean }}" \
            '{event_type:"ui-package-updated", client_payload:{version:$v}}')
          for repo in \
            "EnviroByte/datapivot-fe" \
            "EnviroByte/eos_portal" \
            "shubhjhawar/rim-fe" \
            "shubhjhawar/atmosiq-fe"
          do
            echo "POST dispatches → ${repo}"
            curl -fsS -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${repo}/dispatches" \
              -d "${body}"
          done
