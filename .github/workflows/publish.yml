name: Publish to GitHub Packages

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com

      - run: npm ci
      - run: npm run build
      - run: npm run typecheck

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get published version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Dispatch lockfile update to consumer repos
        env:
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          for repo in "EnviroByte/eos_portal" "EnviroByte/datapivot-fe" "EnviroByte/rim-fe" "EnviroByte/atmosiq-fe"; do
            curl -s -X POST \
              -H "Authorization: token $DISPATCH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/$repo/dispatches \
              -d "{\"event_type\":\"ui-package-updated\",\"client_payload\":{\"version\":\"$VERSION\"}}"
            echo "Dispatched to $repo"
          done
